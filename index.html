<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Importa o CSS do Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./src/Styles/styles.css" />

    <title>Mercado-JP</title>
  </head>

  <body>
    <!-- HEADER / NAVBAR -->
    <header>
      <!-- Navbar padrão do Bootstrap -->
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid ms-5">
          <!-- Logo -->
          <img
            src="/docs/5.3/assets/brand/bootstrap-logo.svg"
            alt="Bootstrap"
            width="30"
            height="24"
          />

          <!-- Botão que aparece no mobile (menu hambúrguer) -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Conteúdo do menu -->
          <div
            class="collapse navbar-collapse d-flex flex-row-reverse"
            id="navbarNav"
          >
            <!-- Lista de links -->
            <ul class="navbar-nav me-5">
              <li class="nav-item">
                <!-- Link ativo -->
                <a class="nav-link active" href="#">Inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Sobre</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Contato</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!--  MAIN (SEÇÃO PRINCIPAL)  -->
    <main class="container-fluid p-0">
      <!-- row = linha do grid -->
      <!-- g-0 = remove espaçamento entre colunas -->
      <div class="row g-0 align-items-center">
        <!-- COLUNA DE TEXTO -->
        <div class="col-6">
          <!-- mt = margin-top | ms = margin-left -->
          <h1 class="mt-5 ms-5">Lorem ipsum dolor sit amet.</h1>

          <p class="mt-3 ms-5">
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
          </p>

          <!-- Botão do Bootstrap -->
          <button type="button" class="btn btn-success mt-3 ms-5">
            Ver mais
          </button>
        </div>

        <!-- COLUNA DA IMAGEM -->
        <div class="col-6">
          <!-- img-fluid = imagem responsiva -->
          <!-- w-100 = ocupa 100% da coluna -->
          <img
            class="img-fluid w-100"
            src="https://placehold.co/600x400/EEE/31343C"
            alt=""
          />
        </div>
      </div>
    </main>

    <!--  CARROSSEL  -->
    <section class="secao-2 py-5">
      <!-- container centraliza e limita largura -->
      <div class="container">
        <!-- Carousel -->
        <div
          data-bs-interval="2000"
          id="carouselExampleAutoplaying"
          class="carousel slide carousel-fade mx-auto"
          data-bs-ride="carousel"
          style="max-width: 600px"
        >
          <!-- mx-auto = centraliza horizontalmente -->
          <!-- max-width = limita tamanho -->

          <div class="carousel-inner">
            <!-- carousel-inner = área que contém os slides -->

            <!-- ITEM 1 -->
            <div class="carousel-item active d-flex justify-content-center">
              <!-- d-flex + justify-content-center = centraliza a imagem -->
              <img
                src="https://placehold.co/600x400/EEE/31343C"
                class="img-fluid"
                alt=""
              />
            </div>

            <!-- ITEM 2 -->
            <div class="carousel-item d-flex justify-content-center">
              <img
                src="https://placehold.co/600x400/EEE/31343C"
                class="img-fluid"
                alt=""
              />
            </div>

            <!-- ITEM 3 -->
            <div class="carousel-item d-flex justify-content-center">
              <img
                src="https://placehold.co/600x400/EEE/31343C"
                class="img-fluid"
                alt=""
              />
            </div>
          </div>

          <!-- BOTÃO ESQUERDA -->
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="prev"
          >
            <!-- Ícone da seta -->
            <span class="carousel-control-prev-icon"></span>
          </button>

          <!-- BOTÃO DIREITA -->
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
      </div>
    </section>

    <!-- JS do Bootstrap (faz navbar e carousel funcionarem) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
